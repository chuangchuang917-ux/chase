name: Chase Daily Supabase Sync (v2)

on:
  # 每日台灣時間 18:30（UTC 10:30）執行
  # 確保 TWSE/TPEx 資料已在台灣時間 15:30 後更新完畢
  schedule:
    - cron: '30 10 * * 1-5'   # 只在週一至週五執行（UTC 10:30 = 台灣 18:30）
  # 允許手動觸發（測試用）
  workflow_dispatch:
    inputs:
      target_date:
        description: '手動指定抓取日期（YYYY-MM-DD，留空則自動推算最近交易日）'
        required: false
        default: ''

jobs:
  daily-update:
    name: Rebuild SQLite from Supabase → Crawl → Sync
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. 取出程式碼 ─────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 設定 Python ─────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 3. 安裝依賴 ────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. 執行新版每日更新腳本（v2 新架構）─────────
      #   新架構不依賴 GitHub Cache，每次從 Supabase 重建暫存 SQLite
      - name: Set override date env (if manual trigger)
        if: github.event.inputs.target_date != ''
        run: echo "OVERRIDE_DATE=${{ github.event.inputs.target_date }}" >> $GITHUB_ENV

      - name: Run daily update v2
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
        run: python daily_update_v2.py

      # ── 5. 輸出摘要 ────────────────────────────────────
      - name: Print summary
        if: always()
        run: |
          echo "## ✅ Chase Daily Update Summary (v2)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 說明 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 執行時間 | $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M:%S') (台灣時間) |" >> $GITHUB_STEP_SUMMARY
          echo "| Cron 排程 | 30 10 * * 1-5 (每週一至週五 UTC 10:30 = 台灣 18:30) |" >> $GITHUB_STEP_SUMMARY
          echo "| 架構 | v2（Supabase 為 Single Source of Truth，不依賴 GitHub Cache）|" >> $GITHUB_STEP_SUMMARY
          echo "| Supabase | ${{ secrets.SUPABASE_URL }} |" >> $GITHUB_STEP_SUMMARY
